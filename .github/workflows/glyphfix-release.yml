name: Glyph Fix Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*-glyphfix*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Find release JAR
        id: jar
        shell: bash
        run: |
          JAR=$(find build/libs -maxdepth 1 -type f \
            -name "angelica-*.jar" \
            ! -name "*-api.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-predowngrade.jar" \
            ! -name "*-preshadow.jar" \
            ! -name "*-shadow-stripped.jar" \
            | head -n 1)

          if [ -z "$JAR" ]; then
            echo "Release JAR not found"
            exit 1
          fi

          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
          body: |
            Unofficial Angelica fork build.

            Changes:
            - Fixes GTNH PUA/custom glyph rendering with custom fonts.